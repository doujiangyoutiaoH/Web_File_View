<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>棰勮 - {{ doc.filename }}</title>
    <style>
      body { margin: 0; }
      #viewer { position: relative; }
      canvas { display: block; margin: 0 auto; }
      .watermark {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
      }
      .wm-text {
        position: absolute;
        color: rgba(180,180,180,0.35);
        font-size: 28px;
        transform: rotate(-30deg);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h2>{{ doc.filename }}</h2>
    <div id="viewer">
      <canvas id="the-canvas"></canvas>
      <div class="watermark" id="wm"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.13.216/pdf.min.js"></script>
    <script>
      const url = `/files/{{ doc.id }}/pdf`;
      const watermark = `{{ watermark }}`;
      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.13.216/pdf.worker.min.js';

      fetch(url, { credentials: 'same-origin' }).then(r => r.arrayBuffer()).then(function(data) {
        pdfjsLib.getDocument({data}).promise.then(function(pdf) {
          pdf.getPage(1).then(function(page) {
            var scale = 1.5;
            var viewport = page.getViewport({scale: scale});
            var canvas = document.getElementById('the-canvas');
            var context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            var renderContext = {canvasContext: context, viewport: viewport};
            page.render(renderContext).promise.then(function() {
              // draw repeated watermark overlay
              const wm = document.getElementById('wm');
              const stepY = 120;
              for (let y = 0; y < canvas.height; y += stepY) {
                const span = document.createElement('div');
                span.className = 'wm-text';
                <!doctype html>
                <html>
                  <head>
                    <meta charset="utf-8" />
                    <title>棰勮 - {{ doc.filename }}</title>
                    <style>
                      body { margin: 0; background: #333; color: #fff; }
                      #viewer { padding: 8px; display:flex; flex-direction:column; gap:12px; align-items:center; }
                      img.page { max-width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.6); }
                      .meta { margin: 8px; }
                    </style>
                  </head>
                  <body oncontextmenu="return false">
                    <div class="meta">
                      <h2 style="margin:0">{{ doc.filename }}</h2>
                      {% if doc.pages %}
                      <div>Pages: {{ doc.pages }}</div>
                      {% endif %}
                    </div>
                    <div id="viewer">
                      {% if doc.pages %}
                        {% for p in range(1, (doc.pages or 1) + 1) %}
                          <img class="page" src="/files/{{ doc.id }}/pages/{{ p }}.png" alt="page {{ p }}" />
                        {% endfor %}
                      {% else %}
                        <p>鏃犳硶棰勮锛堟枃浠舵棤椤垫暟淇℃伅锛夛紝姝ｅ湪鍥為€€鍒?PDF 娓叉煋銆?/p>
                        <iframe src="/files/{{ doc.id }}/pdf" style="width:100%;height:90vh;border:none"></iframe>
                      {% endif %}
                    </div>
                  </body>
                </html>
